name: Deploy Hotel Menu Manager

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup deployment directory
        run: |
          # Create project directory
          mkdir -p ~/Go-project-1st
          
          # Copy repository files to deployment directory
          cp -r ./* ~/Go-project-1st/ 2>/dev/null || true
          cp -r ./.[!.]* ~/Go-project-1st/ 2>/dev/null || true
          
          cd ~/Go-project-1st
          
          # Create .env file if it doesn't exist
          if [ ! -f .env ]; then
            echo "Creating .env file from example..."
            if [ -f .env.example ]; then
              cp .env.example .env
              echo "⚠️  WARNING: Update .env with production values!"
            else
              echo "Creating default .env file..."
              echo "DB_HOST=db" > .env
              echo "DB_PORT=5432" >> .env
              echo "DB_USER=postgres" >> .env
              echo "DB_PASSWORD=HotelMenu2024!Secure" >> .env
              echo "DB_NAME=hotel_menu" >> .env
              echo "DB_SSLMODE=disable" >> .env
              echo "SERVER_PORT=8080" >> .env
              echo "JWT_SECRET=your-super-secret-jwt-key-change-this-in-production" >> .env
              echo "ALLOWED_ORIGINS=http://localhost:3000" >> .env
            fi
          fi

      - name: Stop existing containers
        run: |
          cd ~/Go-project-1st
          docker-compose -f docker-compose.prod.yml down 2>/dev/null || true

      - name: Build and start containers
        run: |
          cd ~/Go-project-1st
          DOCKER_BUILDKIT=0 docker-compose -f docker-compose.prod.yml up -d --build

      - name: Wait for services to start
        run: |
          echo "Waiting for services to be ready..."
          sleep 45
          echo "Checking container status..."
          docker ps

      - name: Verify deployment
        run: |
          echo "Testing backend API..."
          curl -sf http://localhost:8080/api/foods > /dev/null && echo "✅ Backend OK" || echo "⚠️ Backend not ready yet"
          
          echo "Testing frontend..."
          curl -sf http://localhost:3000 > /dev/null && echo "✅ Frontend OK" || echo "⚠️ Frontend not ready yet"

      - name: Show deployment status
        run: |
          echo "=================================="
          echo "       DEPLOYMENT COMPLETE        "
          echo "=================================="
          docker ps
          echo ""
          PUBLIC_IP=$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4 2>/dev/null || echo "YOUR_EC2_IP")
          echo "Frontend: http://$PUBLIC_IP:3000"
          echo "Backend API: http://$PUBLIC_IP:8080/api/foods"
          echo "✅ All services deployed!"