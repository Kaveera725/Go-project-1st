name: Deploy Hotel Menu Manager

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup deployment directory
        run: |
          mkdir -p /home/ubuntu/Go-project-1st
          cd /home/ubuntu/Go-project-1st
          
          # Create .env file if it doesn't exist
          if [ ! -f .env ]; then
            echo "Creating .env file from example..."
            cp .env.example .env
            echo "⚠️  WARNING: Update .env with production values!"
          fi

      - name: Pull latest changes
        run: |
          cd /home/ubuntu/Go-project-1st
          git pull origin main || (git clone https://github.com/YOUR_USERNAME/YOUR_REPO.git . && git checkout main)

      - name: Stop containers
        run: |
          cd /home/ubuntu/Go-project-1st
          docker-compose -f docker-compose.prod.yml down

      - name: Build and start
        run: |
          cd /home/ubuntu/Go-project-1st
          DOCKER_BUILDKIT=0 docker-compose -f docker-compose.prod.yml up -d --build

      - name: Wait for services
        run: sleep 30

      - name: Verify deployment
        run: |
          curl -f http://localhost:8080/api/foods || echo "⚠️ Backend not ready"
          curl -f http://localhost:3000 || echo "⚠️ Frontend not ready"

      - name: Show status
        run: |
          docker ps
          echo "✅ Deployment complete!"
          echo "Frontend: http://65.2.35.4:3000"
          echo "Backend: http://65.2.35.4:8080/api/foods"